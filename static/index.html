<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dignal - Demo IoT con LLM local</title>

  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <main class="container">
    <h1>Dignal - Demo IoT con LLM local</h1>

    <p>
      Escribe una instrucción como:
      <strong>enciende el foco</strong>,
      <strong>apaga el motor</strong> o
      <strong>dime la temperatura</strong>.
    </p>

    <textarea 
      id="prompt" 
      rows="6" 
      placeholder="Escribe aquí tu petición...">
    </textarea>

    <button id="sendBtn">Enviar</button>

    <section class="panel">
      <h2>Respuesta del servidor</h2>
      <pre id="output">Esperando petición...</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
